name: Noctrinth Release

# Builds, signs and publishes Noctrinth desktop bundles to GitHub Releases.
# The Tauri updater (configured in apps/app/tauri.conf.json) reads the
# generated `latest.json` from the latest published release.
#
# Release flow:
#   1. Bump the version in apps/app-frontend/package.json
#   2. Commit, then push a matching tag, e.g.  git tag v0.2.0 && git push origin v0.2.0
#   3. This workflow builds every OS, creates a DRAFT release, uploads the
#      bundles + latest.json. Review it, then publish the draft — updates go
#      live for existing installs once the release is published.
#
# Required repository secrets:
#   TAURI_SIGNING_PRIVATE_KEY           contents of ~/.tauri/noctrinth-updater.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  the key password (empty string if none)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

concurrency:
  group: noctrinth-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--features updater --target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: '--features updater'
            rust-targets: ''
          - platform: windows-latest
            args: '--features updater'
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    env:
      # Public Stripe publishable key used by the frontend build (safe to expose).
      VITE_STRIPE_PUBLISHABLE_KEY: pk_live_51JbFxJJygY5LJFfKLVVldb10HlLt24p421OWRsTOWc5sXYFOnFUXWieSc6HD3PHo25ktx8db1WcHr36XGFvZFVUz00V9ixrCs5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            build-essential \
            libssl-dev

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Prepare app-lib environment
        shell: bash
        run: |
          cp packages/app-lib/.env.prod packages/app-lib/.env
          # OAuth credentials are not committed to .env.prod — inject them
          # from repository secrets so the compile-time env!() calls resolve.
          {
            echo "MODRINTH_OAUTH_CLIENT_ID=${{ secrets.MODRINTH_OAUTH_CLIENT_ID }}"
            echo "MODRINTH_OAUTH_CLIENT_SECRET=${{ secrets.MODRINTH_OAUTH_CLIENT_SECRET }}"
          } >> packages/app-lib/.env

      - name: Install dependencies
        run: pnpm install

      - name: Build, sign and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/app
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'Noctrinth __VERSION__'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
